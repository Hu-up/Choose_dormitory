<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>宿舍选择入口</title>
  <style>
    :root {
      --blue: #0756a6;
      --blue-deep: #063b78;
      --blue-soft: #e8f2ff;
      --ink: #10223f;
      --muted: #617491;
      --line: rgba(255, 255, 255, .34);
      --shadow: 0 24px 58px rgba(4, 43, 91, .24);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(90deg, rgba(3, 37, 83, .82), rgba(9, 80, 160, .42)),
        linear-gradient(180deg, rgba(2, 23, 56, .1), rgba(2, 23, 56, .5)),
        url("assets/entrance-bg.jpg") center / cover no-repeat;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 68% 22%, rgba(255, 255, 255, .18), transparent 32%);
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(20px, 4vw, 46px);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .ncepu-logo {
      width: min(330px, 62vw);
      height: 90px;
      border-radius: 8px;
      background-image: url("assets/ncepu-logo-bg.jpg");
      background-repeat: no-repeat;
      background-size: 780px auto;
      background-position: 0 0;
      filter: drop-shadow(0 8px 18px rgba(0, 0, 0, .24));
    }

    .college-mark {
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, .34);
      border-radius: 999px;
      background: rgba(255, 255, 255, .14);
      color: rgba(255, 255, 255, .92);
      backdrop-filter: blur(12px);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    main {
      align-self: center;
      width: min(960px, 100%);
      padding: 8vh 0 7vh;
    }

    .eyebrow {
      display: inline-flex;
      margin-bottom: 16px;
      padding: 7px 12px;
      border: 1px solid rgba(255, 255, 255, .38);
      border-radius: 999px;
      background: rgba(255, 255, 255, .12);
      backdrop-filter: blur(10px);
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 12px;
      max-width: 820px;
      font-size: clamp(34px, 6vw, 66px);
      line-height: 1.08;
      letter-spacing: 0;
      text-shadow: 0 10px 28px rgba(0, 0, 0, .28);
    }

    .subtitle {
      margin: 0;
      max-width: 640px;
      color: rgba(255, 255, 255, .88);
      font-size: clamp(16px, 2vw, 20px);
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
      margin-top: 38px;
      max-width: 760px;
    }

    a.choice-card {
      min-height: 172px;
      display: grid;
      align-content: space-between;
      gap: 18px;
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .92), rgba(232, 242, 255, .78));
      color: var(--blue-deep);
      text-decoration: none;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    a.choice-card:hover {
      border-color: rgba(255, 255, 255, .84);
      box-shadow: 0 28px 70px rgba(4, 43, 91, .32);
      transform: translateY(-4px);
    }

    .choice-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .choice-card strong {
      display: block;
      font-size: 30px;
      letter-spacing: 0;
    }

    .choice-card span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    .choice-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: var(--blue);
      color: #ffffff;
      font-weight: 900;
    }

    .choice-action {
      color: var(--blue);
      font-weight: 800;
    }

    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 13px 18px;
      border: 1px solid rgba(255, 255, 255, .24);
      border-radius: 12px;
      background: rgba(4, 63, 126, .64);
      backdrop-filter: blur(12px);
      color: rgba(255, 255, 255, .9);
      font-size: 14px;
    }

    footer strong {
      font-size: 15px;
      letter-spacing: .18em;
    }

    @media (max-width: 760px) {
      header,
      footer {
        align-items: flex-start;
        flex-direction: column;
      }

      .ncepu-logo {
        width: min(300px, 86vw);
        height: 82px;
        background-size: 710px auto;
      }

      .choices {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="ncepu-logo" aria-label="华北电力大学"></div>
      <div class="college-mark">控制与计算机工程学院</div>
    </header>

    <main>
      <div class="eyebrow">宿舍选择入口</div>
      <h1>控制与计算机工程学院宿舍选择系统</h1>
      <p class="subtitle">请选择对应页面填写，男生和女生宿舍分开提交，后台由管理员统一管理。</p>

      <div class="choices">
        <a class="choice-card" href="male.html">
          <div class="choice-top">
            <div>
              <strong>男生宿舍</strong>
              <span>进入男生宿舍选择页</span>
            </div>
            <div class="choice-icon">男</div>
          </div>
          <div class="choice-action">开始选择</div>
        </a>

        <a class="choice-card" href="female.html">
          <div class="choice-top">
            <div>
              <strong>女生宿舍</strong>
              <span>进入女生宿舍选择页</span>
            </div>
            <div class="choice-icon">女</div>
          </div>
          <div class="choice-action">开始选择</div>
        </a>
      </div>
    </main>

    <footer>
      <span>华北电力大学控制与计算机工程学院</span>
      <strong>团结 勤奋 求实 创新</strong>
    </footer>
  </div>
</body>
</html>
