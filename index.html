<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>宿舍选择入口</title>
  <style>
    :root {
      --blue: #0756a6;
      --blue-deep: #063b78;
      --blue-soft: #e8f2ff;
      --ink: #10223f;
      --muted: #617491;
      --line: rgba(255, 255, 255, .34);
      --shadow: 0 24px 58px rgba(4, 43, 91, .24);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(90deg, rgba(3, 37, 83, .82), rgba(9, 80, 160, .42)),
        linear-gradient(180deg, rgba(2, 23, 56, .1), rgba(2, 23, 56, .5)),
        url("assets/entrance-bg.jpg") center / cover no-repeat;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 68% 22%, rgba(255, 255, 255, .18), transparent 32%);
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: clamp(20px, 4vw, 46px);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .ncepu-logo {
      width: min(330px, 62vw);
      height: 90px;
      background-image: url("assets/ncepu-logo-white.png");
      background-repeat: no-repeat;
      background-size: contain;
      background-position: 0 0;
      filter: drop-shadow(0 8px 18px rgba(0, 0, 0, .24));
    }

    main {
      align-self: center;
      width: min(1280px, 100%);
      padding: 5vh 0 8vh;
      text-align: center;
      justify-self: center;
    }

    .eyebrow {
      display: inline-flex;
      margin-bottom: 14px;
      font-size: clamp(24px, 2.05vw, 34px);
      font-weight: 900;
      text-shadow: 0 8px 22px rgba(0, 0, 0, .3);
    }

    h1 {
      margin: 0 auto 16px;
      max-width: none;
      margin-left: auto;
      margin-right: auto;
      font-size: clamp(34px, 4.4vw, 72px);
      line-height: 1.12;
      letter-spacing: 0;
      text-shadow: 0 10px 28px rgba(0, 0, 0, .28);
      white-space: nowrap;
    }

    .subtitle {
      margin: 0;
      max-width: 920px;
      margin-left: auto;
      margin-right: auto;
      color: rgba(255, 255, 255, .88);
      font-size: clamp(17px, 1.35vw, 22px);
      line-height: 1.55;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
      margin-top: 38px;
      margin-left: auto;
      margin-right: auto;
      max-width: 840px;
      text-align: left;
    }

    a.choice-card {
      min-height: 178px;
      display: grid;
      align-content: space-between;
      gap: 18px;
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .92), rgba(232, 242, 255, .78));
      color: var(--blue-deep);
      text-decoration: none;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    a.choice-card:hover {
      border-color: rgba(255, 255, 255, .84);
      box-shadow: 0 28px 70px rgba(4, 43, 91, .32);
      transform: translateY(-4px);
    }

    .choice-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .choice-card strong {
      display: block;
      font-size: 30px;
      letter-spacing: 0;
    }

    .choice-card span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    .choice-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: var(--blue);
      color: #ffffff;
      font-weight: 900;
    }

    .choice-action {
      color: var(--blue);
      font-weight: 800;
    }

    @media (max-width: 760px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .ncepu-logo {
        width: min(300px, 86vw);
        height: 82px;
        background-size: contain;
      }

      .choices {
        grid-template-columns: 1fr;
      }

      h1 {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="ncepu-logo" aria-label="华北电力大学"></div>
    </header>

    <main>
      <div class="eyebrow">宿舍选择入口</div>
      <h1>控制与计算机工程学院宿舍选择系统</h1>
      <p class="subtitle">请选择对应页面填写，男生和女生宿舍分开提交，后台由管理员统一管理。</p>

      <div class="choices">
        <a class="choice-card" href="male.html">
          <div class="choice-top">
            <div>
              <strong>男生宿舍</strong>
              <span>进入男生宿舍选择页</span>
            </div>
            <div class="choice-icon">男</div>
          </div>
          <div class="choice-action">开始选择</div>
        </a>

        <a class="choice-card" href="female.html">
          <div class="choice-top">
            <div>
              <strong>女生宿舍</strong>
              <span>进入女生宿舍选择页</span>
            </div>
            <div class="choice-icon">女</div>
          </div>
          <div class="choice-action">开始选择</div>
        </a>
      </div>
    </main>
  </div>
</body>
</html>
